manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: keebs34
      url-base: https://github.com/keebs34
    - name: cfergeau
      url-base: https://github.com/cfergeau
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-config-totem
      remote: cfergeau
      revision: zmk-module
    - name: zmk-config-selenium
      remote: cfergeau
      revision: my-selenium
    - name: zmk-config-corne-eyelash
      remote: cfergeau
      clone-depth: 1
      revision: main
  self:
    path: config
