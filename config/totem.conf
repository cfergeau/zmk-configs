CONFIG_ZMK_USB_LOGGING=n
CONFIG_ZMK_STUDIO=y

# Add battery reporting for second half
# https://zmk.dev/docs/config/battery#peripheral-battery-monitoring
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Low power states
# https://zmk.dev/docs/config/power
CONFIG_ZMK_SLEEP=y
# Default value (30 seconds)
# CONFIG_ZMK_IDLE_TIMEOUT=30000
# Default value (15 min)
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# This is required to fix "stuck key" issues with some key combinations
# For example, when quickly pressing/releasing "space" and then "shift",
# the "space" key can get stuck until the left half is reset.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
